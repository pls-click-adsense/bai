name: Build Vibe IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile and Package
        run: |
          # 1. 作業ディレクトリ作成
          mkdir -p Payload/MyVibeApp.app

          # 2. Swiftファイルのコンパイル (簡易的なビルド)
          # 本来はSDK指定などが必要だが、最小構成なら swiftc でバイナリを作成
          xcrun -sdk iphoneos swiftc -target arm64-apple-ios15.0 \
            Main.swift -o Payload/MyVibeApp.app/MyVibeApp \
            -emit-executable

          # 3. 最小限の Info.plist 生成 (これがないとiPhoneで開けない)
          cat <<EOF > Payload/MyVibeApp.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key> <string>MyVibeApp</string>
              <key>CFBundleIdentifier</key> <string>com.yourname.vibe</string>
              <key>CFBundleName</key> <string>VibeApp</string>
              <key>CFBundlePackageType</key> <string>APPL</string>
              <key>CFBundleShortVersionString</key> <string>1.0</string>
          </dict>
          </plist>
          EOF

          # 4. IPA化 (zip圧縮して拡張子変更)
          zip -r MyVibeApp.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyVibeApp-IPA
          path: MyVibeApp.ipa
