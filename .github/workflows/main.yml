name: Build Vibe IPA

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Package
        run: |
          mkdir -p Payload/MyVibeApp.app

          # SDKパスの取得とコンパイル
          # -parse-as-library で @main エラーを回避
          xcrun -sdk iphoneos swiftc \
            -target arm64-apple-ios15.0 \
            -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
            -parse-as-library \
            Main.swift \
            -o Payload/MyVibeApp.app/MyVibeApp \
            -emit-executable

          # 最小限の Info.plist 生成
          cat <<EOF > Payload/MyVibeApp.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key> <string>MyVibeApp</string>
              <key>CFBundleIdentifier</key> <string>com.selfmade.vibe</string>
              <key>CFBundleName</key> <string>VibeApp</string>
              <key>CFBundlePackageType</key> <string>APPL</string>
              <key>CFBundleShortVersionString</key> <string>1.0</string>
              <key>CFBundleVersion</key> <string>1</string>
              <key>LSRequiresIPhoneOS</key> <true/>
              <key>MinimumOSVersion</key> <string>15.0</string>
              <key>UILaunchScreen</key> <dict/>
          </dict>
          </plist>
          EOF

          # IPAとして固める
          zip -r MyVibeApp.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyVibeApp-IPA
          path: MyVibeApp.ipa
