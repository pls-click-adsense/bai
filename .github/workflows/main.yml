name: Build DocFolder Vibe IPA

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Package
        run: |
          mkdir -p Payload/MusicVibe.app
          
          xcrun -sdk iphoneos swiftc \
            -target arm64-apple-ios15.0 \
            -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
            -parse-as-library \
            Main.swift \
            -o Payload/MusicVibe.app/MusicVibe \
            -emit-executable

          # LSSupportsOpeningDocumentsInPlace と UIFileSharingEnabled を ON にする
          cat <<EOF > Payload/MusicVibe.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key> <string>MusicVibe</string>
              <key>CFBundleIdentifier</key> <string>com.selfmade.vibe.docs</string>
              <key>CFBundleName</key> <string>MusicVibe</string>
              <key>CFBundlePackageType</key> <string>APPL</string>
              <key>CFBundleShortVersionString</key> <string>1.0</string>
              <key>CFBundleVersion</key> <string>1</string>
              <key>LSRequiresIPhoneOS</key> <true/>
              <key>MinimumOSVersion</key> <string>15.0</string>
              <key>UILaunchScreen</key> <dict/>
              <key>UIFileSharingEnabled</key> <true/>
              <key>LSSupportsOpeningDocumentsInPlace</key> <true/>
          </dict>
          </plist>
          EOF

          zip -r MusicVibe.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MusicVibe-DocBuild
          path: MusicVibe.ipa
