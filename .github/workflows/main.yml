name: Build MusicVibe IPA

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Package
        run: |
          # 1. 構造作成
          mkdir -p Payload/MyVibeApp.app
          
          # 2. コンパイル
          xcrun -sdk iphoneos swiftc \
            -target arm64-apple-ios15.0 \
            -sdk $(xcrun --sdk iphoneos --show-sdk-path) \
            -parse-as-library \
            Main.swift \
            -o Payload/MyVibeApp.app/MyVibeApp \
            -emit-executable

          # 3. Info.plist 生成
          cat <<EOF > Payload/MyVibeApp.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key> <string>MyVibeApp</string>
              <key>CFBundleIdentifier</key> <string>com.selfmade.musicvibe</string>
              <key>CFBundleName</key> <string>MusicVibe</string>
              <key>CFBundlePackageType</key> <string>APPL</string>
              <key>CFBundleShortVersionString</key> <string>1.0</string>
              <key>CFBundleVersion</key> <string>1</string>
              <key>LSRequiresIPhoneOS</key> <true/>
              <key>MinimumOSVersion</key> <string>15.0</string>
              <key>UILaunchScreen</key> <dict/>
              <key>UISupportsDocumentBrowser</key> <true/>
          </dict>
          </plist>
          EOF

          # 4. ここで直接 .ipa という名前で固める
          zip -r MusicVibe.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: MusicVibe-App
          # ここで .ipa ファイルを直接指定
          path: MusicVibe.ipa
